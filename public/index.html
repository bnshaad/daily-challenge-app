<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Challenge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Animated background grid -->
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="container">

        <!-- Header -->
        <header>
            <div class="brand">
                <span class="brand-icon">⚡</span>
                <span class="brand-name">Daily Challenge</span>
            </div>
            <div id="auth-section">
                <span id="user-email"></span>
                <button id="logout-btn" class="btn btn-ghost hidden">Logout</button>
            </div>
        </header>

        <!-- Hero / Auth Area -->
        <div id="auth-forms">
            <div class="hero-section">
                <div class="hero-badge">
                    <span class="badge-dot"></span>
                    New questions every day
                </div>
                <h1 class="hero-title">
                    Test your knowledge.
                    <span class="rotating-word-wrapper">
                        <span class="rotating-word" id="rotating-word">Daily.</span>
                    </span>
                </h1>
                <p class="hero-sub">10 questions. Multiple difficulties. Shareable results. Are you up for it?</p>
            </div>

            <div class="auth-grid">
                <div class="auth-box">
                    <div class="auth-box-label">Login</div>
                    <input type="email" id="login-email" placeholder="Email address" autocomplete="email">
                    <input type="password" id="login-password" placeholder="Password" autocomplete="current-password">
                    <button class="btn btn-primary" onclick="login()">Login <span class="btn-arrow">→</span></button>
                </div>
                <div class="auth-divider"><span>or</span></div>
                <div class="auth-box">
                    <div class="auth-box-label">Sign Up</div>
                    <input type="email" id="signup-email" placeholder="Email address" autocomplete="email">
                    <input type="password" id="signup-password" placeholder="Choose a password" autocomplete="new-password">
                    <button class="btn btn-outline" onclick="signup()">Sign Up <span class="btn-arrow">→</span></button>
                </div>
            </div>
            <!-- In the auth-grid div, add this auth-box -->                                                       
  <div class="auth-box" style="grid-column: 1 / -1; margin-top: 10px;">                                  
      <div class="auth-divider"><span>or</span></div>                                                    
      <button class="btn btn-primary" onclick="googleSignIn()" style="background: #4285F4;">             
          <svg style="width: 18px; height: 18px; margin-right: 8px;" viewBox="0 0 24 24">                
              <path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04      
  2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>                                             
              <path fill="white" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71   
  1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>                                  
              <path fill="white" d="M5.84 
  14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18       
  4.93l2.85-2.22.81-.62z"/>
              <path fill="white" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1  
  7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>                                     
          </svg>
          Sign in with Google                                                                            
      </button>                                                                                          
  </div>                               
        </div>
                     

        <!-- App (hidden until logged in) -->
        <main id="app" class="hidden">
            <div class="app-topbar">
                <div id="score-display">Score: <span id="score">—</span></div>
                <div id="difficulty-selector" class="hidden">
                    <select id="difficulty">
                        <option value="easy">🌱 Easy</option>
                        <option value="medium" selected>🔥 Medium</option>
                        <option value="hard">💀 Hard</option>
                    </select>
                </div>
            </div>

            <div id="progress-bar">
                <div class="progress-label">Question <span id="progress-current">1</span> of <span id="progress-total">10</span></div>
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <div id="question-area">
                <div id="loading">
                    <div class="spinner"></div>
                    <span>Loading your challenge…</span>
                </div>
            </div>
        </main>

    </div>

     <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>               
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>  
    <script src="app.js"></script>
</body>
</html>
